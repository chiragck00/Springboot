spring.application.name=learning
isOnline = true
connection.enabled = noSql
user_name = default
password = default
#spring.profiles.active= qa,dev
spring.web.error.include-message=always

spring.datasource.url=jdbc:h2:mem:userDb;INIT=CREATE SCHEMA IF NOT EXISTS entity;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=jcache
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
logging.level.org.hibernate.cache.spi=DEBUG

spring.jpa.hibernate.ddl-auto=create-drop